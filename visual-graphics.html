    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    /* BODY */
    body {
      background: #0a0f1c;
      color: #ffebf0;
      line-height: 1.6;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 80px 20px;
      background: radial-gradient(circle at top, #3a0b1f, #050910);
    }

    header h1 {
      font-size: 2.5rem;
      color: #fa0035;
      margin-bottom: 10px;
    }

    header p {
      max-width: 700px;
      margin: 10px auto;
      color: #ffbcd4;
    }

    header a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #fa0035, #c9002a);
      transition: 0.3s ease;
    }

    header a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #fa0035;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      font-size: 1.8rem;
      color: #fa0035;
      margin-bottom: 20px;
      text-align: center;
    }

    /* CARD CONTAINER */
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    /* CARD STYLE */
    .card {
      background: rgba(26, 10, 26, 0.7);
      border-radius: 15px;
      padding: 25px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(250,0,53,0.2);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(250,0,53,0.2), transparent 70%);
      top: -50%;
      left: -50%;
      opacity: 0;
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: #fa0035;
      box-shadow: 0 0 20px rgba(250,0,53,0.3);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card h3 {
      color: #fa0035;
      margin-bottom: 10px;
    }

    .card p {
      color: #ffbcd4;
    }

    /* CARD BADGE */
    .card .card-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: linear-gradient(45deg, #fa0035, #c9002a);
      color: #fff;
      padding: 5px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
    }

    /* BUTTONS IN CARDS */
    .card a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      color: #fff;
      background: linear-gradient(45deg, #fa0035, #c9002a);
      border-radius: 25px;
      text-decoration: none;
      transition: 0.3s ease;
      position: relative;
      z-index: 20;
    }

    .card a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #fa0035;
    }

    /* FADE-UP ANIMATION */
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease-out;
    }

    .fade-up.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* FOOTER */
    footer {
      background: #050910;
      color: #ffbcd4;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      border-top: 1px solid rgba(250,0,53,0.2);
    }
  </style>
</head>

<script>
  const elements = document.querySelectorAll('.fade-up');
  const reveal = () => {
    elements.forEach(el => {
      const position = el.getBoundingClientRect().top;
      const screenHeight = window.innerHeight;
      if (position < screenHeight - 100) {
        el.classList.add('show');
      }
    });
  };
  window.addEventListener('scroll', reveal);
  window.addEventListener('load', reveal);
</script>
